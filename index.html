<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#22ff6e" />
    <meta
      name="description"
      content="Ask Kem — AI assistant for Kem Deth's portfolio. Ask anything about his skills, projects, and availability."
    />
    <title>Ask Kem — AI Portfolio Assistant</title>
    <link rel="icon" href="/image/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <!-- HEADER -->
    <header class="chat-header">
      <div class="chat-header-inner">
        <a href="/" class="back-btn" aria-label="Back to portfolio">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="15 18 9 12 15 6" />
          </svg>
          Portfolio
        </a>
        <div class="chat-header-brand">
          <div class="bot-avatar-sm" aria-hidden="true">AI</div>
          <div>
            <span class="chat-header-title">Ask Kem</span>
            <span class="chat-header-sub">
              <span class="online-dot" aria-hidden="true"></span> Online
            </span>
          </div>
        </div>
        <button class="theme-toggle" id="themeBtn" aria-label="Toggle theme">
          <svg
            id="themeIcon"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
        </button>
      </div>
    </header>

    <!-- MAIN CHAT -->
    <main class="chat-main">
      <div class="chat-window" id="chatWindow">
        <!-- Welcome message -->
        <div class="msg-group bot-group" id="welcomeGroup">
          <div class="bot-avatar" aria-hidden="true">AI</div>
          <div class="msg-bubbles">
            <div class="bubble bot-bubble">
              Hey! 👋 I'm Kem's AI assistant. Ask me anything about his skills,
              projects, or availability.
            </div>
          </div>
        </div>

        <!-- Suggested questions -->
        <div class="suggestions" id="suggestions">
          <button
            class="suggestion-btn"
            data-q="What are Kem's strongest skills?"
          >
            💡 What are your strongest skills?
          </button>
          <button class="suggestion-btn" data-q="Is Kem available for hire?">
            🟢 Are you available for hire?
          </button>
          <button class="suggestion-btn" data-q="What projects has Kem built?">
            🛠 What projects have you built?
          </button>
          <button class="suggestion-btn" data-q="How can I contact Kem?">
            📬 How can I contact you?
          </button>
        </div>
      </div>
    </main>

    <!-- INPUT BAR -->
    <div class="chat-input-wrap">
      <div class="chat-input-inner">
        <textarea
          id="userInput"
          class="chat-input"
          placeholder="Ask me anything about Kem..."
          rows="1"
          maxlength="500"
          aria-label="Your message"
        ></textarea>
        <button
          class="send-btn"
          id="sendBtn"
          aria-label="Send message"
          disabled
        >
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="22" y1="2" x2="11" y2="13" />
            <polygon points="22 2 15 22 11 13 2 9 22 2" />
          </svg>
        </button>
      </div>
      <p class="input-hint">
        Powered by OpenAI · <a href="/">Back to portfolio →</a>
      </p>
    </div>

    <script src="/js/srcipt.js"></script>
  </body>
</html>
